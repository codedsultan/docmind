---
# roles/app_runtime_innermind/tasks/main.yml
#
# Adapted from roles/app_runtime_go_kutt in x-infra (Go API + Next.js web
# monorepo pattern) — same shape, NestJS API instead of Go, migrations run
# via `docker compose exec` against the running api container rather than
# a one-shot goose container (matches roles/app_migrate_node's approach
# in x-infra-node, since TypeORM migrations need the app's own node_modules).

- name: Compute app paths
  ansible.builtin.set_fact:
    app_dir: "{{ apps_base_dir }}/innermind-{{ deploy_env }}"
    app_compose_path: "{{ apps_base_dir }}/innermind-{{ deploy_env }}/docker-compose.yml"

- name: Ensure app directory exists
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0755"

- name: Assert .env exists (generated by app_env_innermind)
  ansible.builtin.stat:
    path: "{{ app_dir }}/.env"
  register: innermind_env_stat

- name: Fail if .env missing
  ansible.builtin.fail:
    msg: "Missing {{ app_dir }}/.env — run app_env_innermind role first."
  when:
    - (innermind_require_env | default(true)) | bool
    - not innermind_env_stat.stat.exists

# ------------------------------------------------------------
# Registry login
# ------------------------------------------------------------
- name: Resolve registry config
  ansible.builtin.set_fact:
    app_registry: >-
      {{
        (vault_registries[app.registry_profile])
        if (app.registry_profile is defined and app.registry_profile and (vault_registries is defined) and (vault_registries[app.registry_profile] is defined))
        else {}
      }}
  no_log: true

- name: Login to container registry
  community.docker.docker_login:
    registry_url: "{{ app_registry.url }}"
    username: "{{ app_registry.username }}"
    password: "{{ app_registry.token }}"
    reauthorize: true
  when:
    - app_registry is defined
    - (app_registry | length) > 0
    - app_registry.url is defined
    - app_registry.token is defined
    - (app_registry.token | length) > 0
  no_log: true

# ------------------------------------------------------------
# Extra named volumes
# ------------------------------------------------------------
- name: Ensure extra named volumes exist
  ansible.builtin.command: docker volume create {{ item }}
  loop: "{{ app.volumes_def | default([]) }}"
  changed_when: false

# ------------------------------------------------------------
# Render docker-compose.yml
# ------------------------------------------------------------
- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.innermind.yml.j2
    dest: "{{ app_compose_path }}"
    mode: "0644"

# ------------------------------------------------------------
# Pull images
# ------------------------------------------------------------
- name: Pull app images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ app_dir }}"
  environment:
    TAG: "{{ TAG | default('latest') }}"
  register: pull_out
  changed_when: pull_out.rc == 0 and (pull_out.stdout is search("Downloaded newer image|Pulling|Digest"))
  failed_when: pull_out.rc != 0
  when:
    - app_registry is defined
    - (app_registry | length) > 0
  async: 1800
  poll: 10

# ------------------------------------------------------------
# Clean slate — avoid name conflicts on redeploy
# ------------------------------------------------------------
- name: Bring down any existing compose resources
  ansible.builtin.command: docker compose down --remove-orphans
  args:
    chdir: "{{ app_dir }}"
  ignore_errors: true

# ------------------------------------------------------------
# Bring up the stack
# ------------------------------------------------------------
- name: Bring up innermind stack
  ansible.builtin.command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ app_dir }}"
  environment:
    TAG: "{{ TAG | default('latest') }}"
  register: app_up
  changed_when: app_up.rc == 0 and (app_up.stdout is search("Creating|Recreating|Starting") or app_up.stderr is search("Creating|Recreating|Starting"))
  failed_when: app_up.rc != 0

# ------------------------------------------------------------
# Wait for API container to be running
# ------------------------------------------------------------
- name: Compute API container name
  ansible.builtin.set_fact:
    innermind_api_container: "innermind-{{ deploy_env }}-{{ app.innermind.api_service | default(innermind_api_service_name) }}"

- name: Wait for API container to be running
  ansible.builtin.shell: |
    docker ps --filter "name={{ innermind_api_container }}" --filter "status=running" | grep -c "{{ innermind_api_container }}" || true
  register: api_running
  retries: 30
  delay: 5
  until: api_running.stdout | trim | int > 0
  changed_when: false

# ------------------------------------------------------------
# Run migrations against the running api container
# (api image ships with node_modules + dist/database/migrations)
# ------------------------------------------------------------
- name: Run database migrations on running container
  community.docker.docker_container_exec:
    container: "{{ innermind_api_container }}"
    command: "node node_modules/typeorm/cli.js migration:run -d dist/config/typeorm.cli.js"
  register: migrate_result
  failed_when: migrate_result.rc != 0
  when: (app.innermind.run_migrate | default(innermind_run_migrate)) | bool

- name: Show migration output
  ansible.builtin.debug:
    msg: "{{ migrate_result.stdout_lines | default([]) }}"
  when:
    - (app.innermind.run_migrate | default(innermind_run_migrate)) | bool
    - migrate_result is defined

# ------------------------------------------------------------
# Run seeds — staging/dev only, never production
# ------------------------------------------------------------
- name: Run seeds on running container (non-production only)
  community.docker.docker_container_exec:
    container: "{{ innermind_api_container }}"
    command: "node dist/database/seeds/run-seed.js"
  register: seed_result
  failed_when: seed_result.rc != 0
  when:
    - (app.innermind.run_seed | default(innermind_run_seed)) | bool
    - deploy_env != 'production'

# ------------------------------------------------------------
# Health check — API readiness (DB connectivity proven)
# ------------------------------------------------------------
- name: Wait for API health endpoint
  ansible.builtin.command: >
    docker run --rm
    --network cluster_{{ deploy_env }}_shared
    alpine:3.22
    wget -qO-
    http://{{ innermind_api_container }}:{{ app.innermind.health_port | default(innermind_health_port) }}{{ app.innermind.health_endpoint | default(innermind_health_endpoint) }}
  register: innermind_health
  until: innermind_health.rc == 0
  retries: "{{ app.innermind.health_retries | default(innermind_health_retries) }}"
  delay: "{{ app.innermind.health_delay | default(innermind_health_delay) }}"
  changed_when: false
  when: (app.innermind.health_enabled | default(innermind_health_enabled)) | bool

- name: Show health check passed
  ansible.builtin.debug:
    msg: "✅ innermind API healthy at {{ innermind_api_container }}:{{ app.innermind.health_port | default(innermind_health_port) }}{{ app.innermind.health_endpoint | default(innermind_health_endpoint) }}"
  when: (app.innermind.health_enabled | default(innermind_health_enabled)) | bool
