---
app:
  registry_profile: "ghcr"

  domains:
    staging: ["staging.innermind.xurl.fyi"]
    production: ["innermind.xurl.fyi"]

  public_service: web
  public_service_port: 3000

  caddy_verify_path: "/"

  innermind:
    api_service: "api"
    web_service: "web"

    registry: "ghcr.io/codedsultan/innermind"

    health_enabled: true
    health_endpoint: "/health/ready"
    health_port: 4000
    health_retries: 20
    health_delay: 5

    run_migrate: true
    run_seed: true   # no-op in production — guarded by deploy_env check

  db:
    engine: postgres
    name: innermind
    user: innermind
    host: "cluster-{{ deploy_env }}-shared-postgres"
    port: 5432
    password_var: "vault_pg_app_innermind_password"

  env:
    base:
      NODE_ENV: "production"
      API_PREFIX: "api"
      PORT: "4000"
      PG_SSL: "false"

    derived:
      REDIS_HOST: "cluster-{{ deploy_env }}-shared-redis"
      REDIS_PORT: "6379"
      CORS_ORIGIN: "https://innermind.xurl.fyi"

    secret_map:
      JWT_SECRET: "vault_innermind_jwt_secret"
      REDIS_PASSWORD: "vault_redis_password"

    secret_map_optional: {}

    required_keys:
      - NODE_ENV
      - PORT
      - PG_HOST
      - PG_PASSWORD
      - JWT_SECRET

  runtime:
    services:
      api:
        image: "ghcr.io/codedsultan/innermind/api:${TAG}"
        expose: ["4000"]
        env_file: ".env"
        healthcheck:
          test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
          interval: "15s"
          timeout: "5s"
          retries: 5
          start_period: "20s"

      web:
        image: "ghcr.io/codedsultan/innermind/web:${TAG}"
        expose: ["3000"]
        environment:
          NODE_ENV: "production"
          PORT: "3000"
          HOSTNAME: "0.0.0.0"
          API_BASE_URL_SERVER: "http://innermind-{{ deploy_env }}-api:4000/api"
        depends_on: ["api"]
        healthcheck:
          test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
          interval: "15s"
          timeout: "5s"
          retries: 5
          start_period: "20s"
