name: Build & Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io/codedsultan/js-stack

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
            frontend:
              - 'frontend/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'

      - name: Force full run on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual dispatch — treating all paths as changed"

  # ────────────────────────────────────────────────────────────────
  # 1. CI
  # ────────────────────────────────────────────────────────────────
  test-backend:
    name: Test & Build (backend)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        working-directory: backend
        run: |
          if grep -q '"test:coverage"' package.json; then
            pnpm test:coverage
          elif grep -q '"test:cov"' package.json; then
            pnpm test:cov
          else
            echo "No test coverage script found, skipping"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

      - name: Build
        working-directory: backend
        run: |
          npx prisma generate
          pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  test-frontend:
    name: Test & Build (frontend)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        working-directory: frontend
        run: |
          if grep -q '"test:coverage"' package.json; then
            pnpm test:coverage
          elif grep -q '"test:cov"' package.json; then
            pnpm test:cov
          else
            echo "No test coverage script found, skipping"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: "https://staging.jsstack.xurl.fyi/api"
        run: pnpm build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high || true

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images
  #
  #    All three Dockerfiles use context: . (monorepo root) so
  #    pnpm-lock.yaml resolves against the full workspace graph.
  #    api + worker share the backend codebase — built together.
  #    main    → manual trigger only
  #    develop → auto on every push
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [changes, test-backend, test-frontend, security]
    if: |
      always() &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/develop')
      )

    outputs:
      image_tag: ${{ steps.tags.outputs.deploy_tag }}
      environment: ${{ steps.env.outputs.environment }}
      built_backend: ${{ steps.tags.outputs.built_backend }}
      built_frontend: ${{ steps.tags.outputs.built_frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          BUILD_BACKEND="${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}"
          BUILD_FRONTEND="${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}"
          echo "built_backend=${BUILD_BACKEND}" >> $GITHUB_OUTPUT
          echo "built_frontend=${BUILD_FRONTEND}" >> $GITHUB_OUTPUT

          if [[ "${{ steps.env.outputs.environment }}" == "production" ]]; then
            echo "deploy_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_tags=${{ env.REGISTRY }}/api:latest,${{ env.REGISTRY }}/api:${{ github.sha }},${{ env.REGISTRY }}/api:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "worker_tags=${{ env.REGISTRY }}/worker:latest,${{ env.REGISTRY }}/worker:${{ github.sha }},${{ env.REGISTRY }}/worker:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "web_tags=${{ env.REGISTRY }}/web:latest,${{ env.REGISTRY }}/web:${{ github.sha }},${{ env.REGISTRY }}/web:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_url=https://jsstack.xurl.fyi/api" >> $GITHUB_OUTPUT
          else
            echo "deploy_tag=develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_tags=${{ env.REGISTRY }}/api:develop,${{ env.REGISTRY }}/api:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "worker_tags=${{ env.REGISTRY }}/worker:develop,${{ env.REGISTRY }}/worker:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "web_tags=${{ env.REGISTRY }}/web:develop,${{ env.REGISTRY }}/web:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_url=https://staging.jsstack.xurl.fyi/api" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.tags.outputs.built_backend == 'true' || steps.tags.outputs.built_frontend == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.tags.outputs.built_backend == 'true' || steps.tags.outputs.built_frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tags.outputs.built_backend == 'true' || steps.tags.outputs.built_frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        if: steps.tags.outputs.built_backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          target: app
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker image
        if: steps.tags.outputs.built_backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile.worker
          target: app
          push: true
          tags: ${{ steps.tags.outputs.worker_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push web image
        if: steps.tags.outputs.built_frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          target: app
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.tags.outputs.api_url }}
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Image build summary
        run: |
          echo "## 🐳 Js Stack Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ steps.env.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy tag | \`${{ steps.tags.outputs.deploy_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend built | ${{ steps.tags.outputs.built_backend }} (api + worker) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend built | ${{ steps.tags.outputs.built_frontend }} (web) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  