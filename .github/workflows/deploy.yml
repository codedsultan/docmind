name: "3. Production / Staging Deploy"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      api_tag:
        required: true
        type: string
      worker_tag:
        required: true
        type: string
      web_tag:
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to EC2 (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Setup VPN (WireGuard)
        run: |
          sudo apt-get update -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y wireguard wireguard-tools resolvconf netcat-openbsd

          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

          TARGET_IP=10.10.0.1
          ping -c 2 "${TARGET_IP}"
          nc -vz "${TARGET_IP}" 22

      - name: Configure Known Hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t ed25519 10.10.0.1 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Execute Remote Deployment via SSH
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          APP_ENV: ${{ inputs.environment }}
          API_TAG: ${{ inputs.api_tag }}
          WORKER_TAG: ${{ inputs.worker_tag }}
          WEB_TAG: ${{ inputs.web_tag }}
        run: |
          ssh -o ConnectTimeout=10 "${{ secrets.EC2_USER }}@10.10.0.1" \
            "GHCR_TOKEN='${GHCR_TOKEN}' GHCR_ACTOR='${GHCR_ACTOR}' APP_ENV='${APP_ENV}' API_TAG='${API_TAG}' WORKER_TAG='${WORKER_TAG}' WEB_TAG='${WEB_TAG}' bash -s" <<'REMOTE'
            set -e
            
            APP_DIR="/opt/apps/${APP_ENV}"
            echo "--- Navigating to application directory: $APP_DIR ---"
            cd "$APP_DIR" || { echo "Directory $APP_DIR not found"; exit 1; }
            
            echo "--- Verifying deployment components ---"
            if [ ! -f "update-tags.sh" ]; then
              echo "Error: update-tags.sh is missing in $APP_DIR"
              exit 1
            fi
            
            echo "--- Authenticating with GitHub Container Registry ---"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            
            echo "--- Updating environment target tags ---"
            ./update-tags.sh "$API_TAG" "$WORKER_TAG" "$WEB_TAG"
            
            echo "--- Pulling latest container images ---"
            docker compose pull
            
            echo "--- Restarting stack containers ---"
            docker compose up -d --remove-orphans
            
            echo "--- Cleaning up dangling images ---"
            docker image prune -f
            
            echo "--- Status Check ---"
            docker compose ps
          REMOTE

      - name: Tear down WireGuard tunnel
        if: always()
        run: sudo wg-quick down wg0 || true