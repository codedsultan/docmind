name: Build & Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io/codedsultan/innermind

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. CI — lint, type-check, test, build (both backend & frontend)
  #    Runs on every push and PR (both branches)
  # ────────────────────────────────────────────────────────────────
  test-backend:
    name: Test & Build (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        working-directory: backend
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

      - name: Build
        working-directory: backend
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  test-frontend:
    name: Test & Build (frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        working-directory: frontend
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        working-directory: frontend
        # This build is just to prove `next build` succeeds in CI — its
        # output is discarded. The build that actually ships happens in
        # build-and-push below, with the real per-environment API URL
        # baked in via --build-arg. The value here doesn't need to be live.
        env:
          NEXT_PUBLIC_API_URL: "https://staging.innermind.xurl.fyi/api"
        run: pnpm build

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high || true

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images (api + web)
  #    main  → manual trigger only (workflow_dispatch)
  #    develop → auto on every push
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop')

    outputs:
      image_tag: ${{ steps.tags.outputs.deploy_tag }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${{ steps.env.outputs.environment }}" == "production" ]]; then
            echo "deploy_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_tags=${{ env.REGISTRY }}/api:latest,${{ env.REGISTRY }}/api:${{ github.sha }},${{ env.REGISTRY }}/api:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "web_tags=${{ env.REGISTRY }}/web:latest,${{ env.REGISTRY }}/web:${{ github.sha }},${{ env.REGISTRY }}/web:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_url=https://innermind.xurl.fyi/api" >> $GITHUB_OUTPUT
          else
            echo "deploy_tag=develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_tags=${{ env.REGISTRY }}/api:develop,${{ env.REGISTRY }}/api:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "web_tags=${{ env.REGISTRY }}/web:develop,${{ env.REGISTRY }}/web:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_url=https://staging.innermind.xurl.fyi/api" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: app
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: app
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.tags.outputs.api_url }}
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Image build summary
        run: |
          echo "## 🐳 innermind Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ steps.env.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy tag | \`${{ steps.tags.outputs.deploy_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # 3. Deploy via Ansible — infra/ lives in this same repo, so we
  #    run the playbook directly instead of dispatching to another repo.
  #    The VPS sits behind WireGuard, so the runner brings up a temporary
  #    tunnel first (same pattern as x-infra-node's deploy.yml).
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success'
    environment: ${{ needs.build-and-push.outputs.environment }}
    timeout-minutes: 25
    concurrency:
      group: deploy-${{ needs.build-and-push.outputs.environment }}
      cancel-in-progress: false

    env:
      ENVIRONMENT: ${{ needs.build-and-push.outputs.environment }}
      TAG: ${{ needs.build-and-push.outputs.image_tag }}
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_SSH_COMMON_ARGS: >-
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        -o ServerAliveInterval=15
        -o ServerAliveCountMax=3
        -o ConnectTimeout=30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker

      - name: Install Ansible collections
        working-directory: infra/ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup WireGuard VPN
        run: |
          sudo apt-get update -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y wireguard wireguard-tools resolvconf netcat-openbsd

          echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 5

          TARGET_IP=$([[ "${{ env.ENVIRONMENT }}" == "staging" ]] && echo "${{ secrets.STAGING_SERVER_VPN_IP }}" || echo "${{ secrets.PRODUCTION_SERVER_VPN_IP }}")
          ping -c 2 "${TARGET_IP}"
          nc -vz "${TARGET_IP}" 22 || true

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_VPN_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_VPN_IP }} >> ~/.ssh/known_hosts

      - name: Write Ansible vault password
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.ansible_vault_xurl
          chmod 600 ~/.ansible_vault_xurl

      - name: Run deploy playbook
        working-directory: infra/ansible
        run: |
          timeout 1800 ansible-playbook \
            -i "inventories/${{ env.ENVIRONMENT }}/hosts.ini" \
            playbooks/deploy.yml \
            -e "deploy_env=${{ env.ENVIRONMENT }}" \
            -e "TAG=${{ env.TAG }}" \
            -e "ansible_user=${{ secrets.SERVER_USER }}" \
            -T 60

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ansible_vault_xurl
          sudo wg-quick down wg0 || true

      - name: Deploy summary
        if: success()
        run: |
          echo "## 🚀 innermind Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ env.ENVIRONMENT }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ env.TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
