name: Build & Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: "24"
  REGISTRY: ghcr.io/codedsultan/js-stack

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
            frontend:
              - 'frontend/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
            infra:
              - 'infra/**'

      - name: Force full run on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual dispatch — treating all paths as changed"

  # ────────────────────────────────────────────────────────────────
  # 1. CI
  # ────────────────────────────────────────────────────────────────
  test-backend:
    name: Test & Build (backend)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        working-directory: backend
        run: |
          if grep -q '"test:coverage"' package.json; then
            pnpm test:coverage
          elif grep -q '"test:cov"' package.json; then
            pnpm test:cov
          else
            echo "No test coverage script found, skipping"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

      - name: Build
        working-directory: backend
        run: |
          npx prisma generate
          pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  test-frontend:
    name: Test & Build (frontend)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: |
          if grep -q '"lint"' package.json; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run tests with coverage
        working-directory: frontend
        run: |
          if grep -q '"test:coverage"' package.json; then
            pnpm test:coverage
          elif grep -q '"test:cov"' package.json; then
            pnpm test:cov
          else
            echo "No test coverage script found, skipping"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: "https://staging.jsstack.xurl.fyi/api"
        run: pnpm build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high || true

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  # 2. Build & push Docker images
  #
  #    All three Dockerfiles use context: . (monorepo root) so
  #    pnpm-lock.yaml resolves against the full workspace graph.
  #    api + worker share the backend codebase — built together.
  #    main    → manual trigger only
  #    develop → auto on every push
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [changes, test-backend, test-frontend, security]
    if: |
      always() &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/develop')
      )

    outputs:
      image_tag: ${{ steps.tags.outputs.deploy_tag }}
      environment: ${{ steps.env.outputs.environment }}
      built_backend: ${{ steps.tags.outputs.built_backend }}
      built_frontend: ${{ steps.tags.outputs.built_frontend }}
      api_tag: ${{ steps.tags.outputs.api_deploy_tag }}
      worker_tag: ${{ steps.tags.outputs.worker_deploy_tag }}
      web_tag: ${{ steps.tags.outputs.web_deploy_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          BUILD_BACKEND="${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}"
          BUILD_FRONTEND="${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}"
          echo "built_backend=${BUILD_BACKEND}" >> $GITHUB_OUTPUT
          echo "built_frontend=${BUILD_FRONTEND}" >> $GITHUB_OUTPUT

          if [[ "${{ steps.env.outputs.environment }}" == "production" ]]; then
            DEPLOY_TAG="${SHORT_SHA}"
            FLOATING_TAG="latest"
            echo "deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
            echo "api_tags=${{ env.REGISTRY }}/api:latest,${{ env.REGISTRY }}/api:${{ github.sha }},${{ env.REGISTRY }}/api:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "worker_tags=${{ env.REGISTRY }}/worker:latest,${{ env.REGISTRY }}/worker:${{ github.sha }},${{ env.REGISTRY }}/worker:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "web_tags=${{ env.REGISTRY }}/web:latest,${{ env.REGISTRY }}/web:${{ github.sha }},${{ env.REGISTRY }}/web:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_url=https://jsstack.xurl.fyi/api" >> $GITHUB_OUTPUT
          else
            DEPLOY_TAG="develop-${SHORT_SHA}"
            FLOATING_TAG="develop"
            echo "deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
            echo "api_tags=${{ env.REGISTRY }}/api:develop,${{ env.REGISTRY }}/api:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "worker_tags=${{ env.REGISTRY }}/worker:develop,${{ env.REGISTRY }}/worker:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "web_tags=${{ env.REGISTRY }}/web:develop,${{ env.REGISTRY }}/web:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "api_url=https://staging.jsstack.xurl.fyi/api" >> $GITHUB_OUTPUT
          fi

          # Per-service deploy tags: use this run's SHA tag if that service
          # was actually rebuilt, otherwise fall back to the floating tag
          # (develop/latest) so the deploy step never pulls a tag that was
          # never pushed. api + worker always move together (same codebase).
          if [[ "${BUILD_BACKEND}" == "true" ]]; then
            echo "api_deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
            echo "worker_deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
          else
            echo "api_deploy_tag=${FLOATING_TAG}" >> $GITHUB_OUTPUT
            echo "worker_deploy_tag=${FLOATING_TAG}" >> $GITHUB_OUTPUT
          fi

          if [[ "${BUILD_FRONTEND}" == "true" ]]; then
            echo "web_deploy_tag=${DEPLOY_TAG}" >> $GITHUB_OUTPUT
          else
            echo "web_deploy_tag=${FLOATING_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.tags.outputs.built_backend == 'true' || steps.tags.outputs.built_frontend == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.tags.outputs.built_backend == 'true' || steps.tags.outputs.built_frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tags.outputs.built_backend == 'true' || steps.tags.outputs.built_frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        if: steps.tags.outputs.built_backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          target: app
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker image
        if: steps.tags.outputs.built_backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile.worker
          target: app
          push: true
          tags: ${{ steps.tags.outputs.worker_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push web image
        if: steps.tags.outputs.built_frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          target: app
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.tags.outputs.api_url }}
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Image build summary
        run: |
          echo "## 🐳 Js Stack Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | **${{ steps.env.outputs.environment }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy tag | \`${{ steps.tags.outputs.deploy_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend built | ${{ steps.tags.outputs.built_backend }} (api + worker) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend built | ${{ steps.tags.outputs.built_frontend }} (web) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # 3. Deploy to EC2
  #
  #    One EC2 host runs both environments in separate directories:
  #      /opt/apps/staging     /opt/apps/production
  #    The instance has no public SSH port — GitHub Actions brings up
  #    a WireGuard tunnel first, then SSHes to the server's internal
  #    VPN address (10.10.0.1). update-tags.sh rewrites only the
  #    *_TAG lines in that env's .env (never touching hand-managed
  #    secrets in the same file), then we pull + recreate. Falls back
  #    to the floating tag for any service that wasn't rebuilt this
  #    run (see Set image tags step).
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (${{ needs.build-and-push.outputs.environment }})
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success'
    environment: ${{ needs.build-and-push.outputs.environment }}

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Setup VPN (WireGuard)
        run: |
          sudo apt-get update -q
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y wireguard wireguard-tools resolvconf netcat-openbsd

          echo "${{ secrets.WG_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

          TARGET_IP=10.10.0.1
          ping -c 2 "${TARGET_IP}"
          nc -vz "${TARGET_IP}" 22

      - name: Configure Known Hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t ed25519 10.10.0.1 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Execute Remote Deployment via SSH
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          APP_ENV: ${{ needs.build-and-push.outputs.environment }}
          API_TAG: ${{ needs.build-and-push.outputs.api_tag }}
          WORKER_TAG: ${{ needs.build-and-push.outputs.worker_tag }}
          WEB_TAG: ${{ needs.build-and-push.outputs.web_tag }}
        run: |
          ssh -o ConnectTimeout=10 "${{ secrets.EC2_USER }}@10.10.0.1" \
            "GHCR_TOKEN='${GHCR_TOKEN}' GHCR_ACTOR='${GHCR_ACTOR}' APP_ENV='${APP_ENV}' API_TAG='${API_TAG}' WORKER_TAG='${WORKER_TAG}' WEB_TAG='${WEB_TAG}' bash -s" <<'REMOTE'
            set -e
            
            APP_DIR="/opt/apps/${APP_ENV}"
            echo "--- Navigating to application directory: $APP_DIR ---"
            cd "$APP_DIR" || { echo "Directory $APP_DIR not found"; exit 1; }
            
            echo "--- Verifying deployment components ---"
            if [ ! -f "update-tags.sh" ]; then
              echo "Error: update-tags.sh is missing in $APP_DIR"
              exit 1
            fi
            
            echo "--- Authenticating with GitHub Container Registry ---"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            
            echo "--- Updating environment target tags ---"
            ./update-tags.sh "$API_TAG" "$WORKER_TAG" "$WEB_TAG"
            
            echo "--- Pulling latest container images ---"
            docker compose pull
            
            echo "--- Restarting stack containers ---"
            docker compose up -d --remove-orphans
            
            echo "--- Cleaning up dangling images ---"
            docker image prune -f
            
            echo "--- Status Check ---"
            docker compose ps
          REMOTE

      - name: Tear down WireGuard tunnel
        if: always()
        run: sudo wg-quick down wg0 || true