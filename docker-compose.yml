# Local end-to-end stack. Mirrors the production topology rendered by
# infra/ansible/roles/app_runtime_innermind/templates/docker-compose.yml.j2:
# the same service names (api, web), the same env var names (PG_*, REDIS_*,
# API_BASE_URL_SERVER), just running against local Postgres/Redis instead
# of the shared cluster.
#
# Usage:
#   cp backend/.env.example backend/.env
#   cp frontend/.env.example frontend/.env
#   docker compose up --build
#
# Frontend:  http://localhost:3000
# Backend:   http://localhost:4000/api
# Swagger:   http://localhost:4000/docs
# Postgres:  localhost:5432 (innermind/innermind)

services:
  postgres:
    image: postgres:16-alpine
    container_name: innermind-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: innermind
      POSTGRES_USER: innermind
      POSTGRES_PASSWORD: innermind
    ports:
      - "5432:5432"
    volumes:
      - innermind_local_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innermind"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - innermind_local

  redis:
    image: redis:7-alpine
    container_name: innermind-local-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - innermind_local

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: innermind-local-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override host-specific values so the API talks to the
      # *containers* on this network, not localhost.
      PG_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - innermind_local

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: innermind-local-migrate
    env_file:
      - ./backend/.env
    environment:
      PG_HOST: postgres
      REDIS_HOST: redis
    command: ["node", "node_modules/typeorm/cli.js", "migration:run", "-d", "dist/config/typeorm.cli.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - innermind_local
    restart: "no"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: app
      args:
        # Baked into the client bundle — must be the URL *your browser*
        # can reach. localhost:4000 works because we publish that port above.
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    container_name: innermind-local-web
    restart: unless-stopped
    environment:
      # Server-side fetches (Server Components) go straight to the
      # api container over the Docker network — mirrors API_BASE_URL_SERVER
      # in infra/ansible's go-kutt-style app definition.
      API_BASE_URL_SERVER: http://api:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - innermind_local

networks:
  innermind_local:
    name: innermind_local

volumes:
  innermind_local_pg_data:
    name: innermind_local_pg_data
