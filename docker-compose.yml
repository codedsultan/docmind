# Local end-to-end stack. 
#
# Usage:
#   cp backend/.env.example backend/.env
#   cp frontend/.env.example frontend/.env
#   docker compose up --build
#
# Frontend:  http://localhost:3400
# Backend:   http://localhost:4500/api
# Swagger:   http://localhost:4500/docs
# Postgres:  localhost:5349 (docmind/docmind)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docmind-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docmind
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind
    ports:
      - "5349:5432"
    volumes:
      - docmind_local_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U docmind" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - docmind_local

  redis:
    image: redis:7-alpine
    container_name: docmind-local-redis
    restart: unless-stopped
    ports:
      - "6399:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - docmind_local

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: app
    container_name: docmind-local-migrate
    # command: [ "node", "node_modules/.bin/prisma", "migrate", "deploy" ]
    command: npx prisma migrate deploy
    env_file:
      - ./backend/.env
    environment:
      PG_HOST: postgres
      DATABASE_URL: postgresql://docmind:${PG_PASSWORD:-docmind}@postgres:5432/docmind
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docmind_local

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: app
    container_name: docmind-local-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PG_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql://docmind:${PG_PASSWORD:-docmind}@postgres:5432/docmind
    ports:
      - "4500:4500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:4500/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - docmind_local

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: app
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4500/api
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-dev-api-key-change-in-production}
    container_name: docmind-local-web
    restart: unless-stopped
    environment:
      API_BASE_URL_SERVER: http://api:4500/api
    ports:
      - "3400:3000"
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - docmind_local

networks:
  docmind_local:
    name: docmind_local

volumes:
  docmind_local_pg_data:
    name: docmind_local_pg_data
