# Local end-to-end stack. 
#
# Usage:
#   cp backend/.env.example backend/.env
#   cp frontend/.env.example frontend/.env
#   docker compose up --build
#
# Frontend:  http://localhost:3000
# Backend:   http://localhost:4000/api
# Swagger:   http://localhost:4000/docs
# Postgres:  localhost:5432 (jsstack/jsstack)

# docker-compose.yml (base)
# Ansible managed — innermind stack
# app=innermind env=staging
# DO NOT EDIT ON SERVER — changes will be overwritten on next deploy
#
# Image tags are resolved by Ansible before this file is rendered:
#   api + worker → backend_tag (SHA tag if rebuilt, 'develop'/'latest' if skipped)
#   web          → frontend_tag (same logic)

services:

  api:
    image: "ghcr.io/codedsultan/js-stack/api:develop-ebd01a4"
    container_name: "innermind-staging-api"
    restart: unless-stopped

    env_file:
      - ".env"

    expose:
      - "4000"

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: "15s"
      timeout: "5s"
      retries: 5
      start_period: "20s"

  worker:
    image: "ghcr.io/codedsultan/js-stack/worker:develop-ebd01a4"
    container_name: "innermind-staging-worker"
    restart: unless-stopped
    env_file:
      - ".env"
    depends_on:
      - "api"
    healthcheck:
      test: [ "CMD-SHELL", "node dist/scripts/worker-health.js || exit 1" ]
      interval: "30s"
      timeout: "10s"
      retries: 3
      start_period: "30s"

  web:
    image: "ghcr.io/codedsultan/js-stack/web:develop-ebd01a4"
    container_name: "innermind-staging-web"
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      API_BASE_URL_SERVER: "http://innermind-staging-api:4000/api"

    expose:
      - "3000"

    depends_on:
      - "api"

    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: "15s"
      timeout: "5s"
      retries: 5
      start_period: "20s"
    # networks:
    #   - cluster_shared
    #   - proxy_global


networks:
